<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Student Grade Calculator</h1>

    <input type="text" id="studentName" placeholder="Enter Student Name">

    <input type="number" id="sub1" placeholder="Subject 1 Marks">
    <input type="number" id="sub2" placeholder="Subject 2 Marks">
    <input type="number" id="sub3" placeholder="Subject 3 Marks">
    <input type="number" id="sub4" placeholder="Subject 4 Marks">
    <input type="number" id="sub5" placeholder="Subject 5 Marks">

    <button onclick="calculateGrade()">Calculate Grade</button>

    <div class="result">
        <h3 id="total"></h3>
        <h3 id="average"></h3>
        <h3 id="grade"></h3>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
